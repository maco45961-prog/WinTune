name: Release — WinNetTools

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_DIR: winnettools-app
  PROJECT: WinNetTools.App.csproj
  ASSEMBLY: WinNetTools

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.APP_DIR }}/${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_DIR }}/${{ env.PROJECT }} -c Release --no-restore

      - name: Publish (self-contained, trimmed)
        run: >
          dotnet publish ${{ env.APP_DIR }}/${{ env.PROJECT }}
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output ./publish/${{ env.ASSEMBLY }}

      - name: Create zip package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipName = "${{ env.ASSEMBLY }}-v${version}-win-x64.zip"
          Compress-Archive -Path "./publish/${{ env.ASSEMBLY }}/*" -DestinationPath $zipName -Force
          Write-Output "Created: $zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSEMBLY }}-package
          path: ${{ env.ASSEMBLY }}-v*-win-x64.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ASSEMBLY }}-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ASSEMBLY }}-v*-win-x64.zip
          name: "WinNetTools ${{ github.ref_name }}"
          body: |
            ## WinNetTools ${{ github.ref_name }}

            Network diagnostic tool for the WinOptimizer ecosystem.

            ### Requirements
            - Windows 10/11
            - winoptimizer-core (included in the zip or as sibling folder)

            ### Quick Start
            1. Download `WinNetTools-v*-win-x64.zip`
            2. Extract and run `WinNetTools.exe`

            ### Note on SmartScreen
            This binary is not code-signed. Windows SmartScreen may show a warning.
            Click **More info** → **Run anyway** to continue.
