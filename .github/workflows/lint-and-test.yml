name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Core: PSScriptAnalyzer ─────────────────────────────
  core-lint:
    name: Core — PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        working-directory: winoptimizer-core
        run: |
          Import-Module PSScriptAnalyzer -Force
          $results = Invoke-ScriptAnalyzer -Path ./engine -Recurse -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
            exit 1
          }
          Write-Output "PSScriptAnalyzer: 0 issues"

  # ─── Core: Pester Tests ─────────────────────────────────
  core-test:
    name: Core — Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.0

      - name: Run Pester Tests
        shell: pwsh
        working-directory: winoptimizer-core
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './test-results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: winoptimizer-core/test-results.xml

  # ─── Core: Module Validation ────────────────────────────
  core-validate:
    name: Core — Module Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Module Manifest
        shell: pwsh
        working-directory: winoptimizer-core
        run: |
          Test-ModuleManifest -Path ./WinOptimizer.Core.psd1
          Write-Output "Module manifest is valid"

      - name: Import Module & Verify Exports
        shell: pwsh
        working-directory: winoptimizer-core
        run: |
          Import-Module ./WinOptimizer.Core.psd1 -Force
          $commands = Get-Command -Module WinOptimizer.Core
          Write-Output "Exported functions: $($commands.Name -join ', ')"
          if ($commands.Count -lt 8) {
            Write-Error "Expected at least 8 exported functions, got $($commands.Count)"
            exit 1
          }

  # ─── .NET Apps: Build Check ─────────────────────────────
  apps-build:
    name: .NET Apps — Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore all projects
        run: |
          dotnet restore winoptimizer-app/WinOptimizer.App.csproj
          dotnet restore winbenchmark-app/WinBenchmark.App.csproj
          dotnet restore winnettools-app/WinNetTools.App.csproj
          dotnet restore winsetupwizard-app/WinSetupWizard.App.csproj
          dotnet restore wingamemodedaemon-app/WinGameModeDaemon.csproj

      - name: Build — WinOptimizer
        run: dotnet build winoptimizer-app/WinOptimizer.App.csproj -c Release --no-restore

      - name: Build — WinBenchmark
        run: dotnet build winbenchmark-app/WinBenchmark.App.csproj -c Release --no-restore

      - name: Build — WinNetTools
        run: dotnet build winnettools-app/WinNetTools.App.csproj -c Release --no-restore

      - name: Build — WinSetupWizard
        run: dotnet build winsetupwizard-app/WinSetupWizard.App.csproj -c Release --no-restore

      - name: Build — WinGameModeDaemon
        run: dotnet build wingamemodedaemon-app/WinGameModeDaemon.csproj -c Release --no-restore
