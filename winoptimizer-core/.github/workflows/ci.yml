name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PSScriptAnalyzer Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -Force
          $results = Invoke-ScriptAnalyzer -Path ./engine -Recurse -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
            exit 1
          }
          Write-Output "PSScriptAnalyzer: 0 issues"

  test:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.0

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './test-results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results.xml

  validate:
    name: Module Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Module Manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./WinOptimizer.Core.psd1
          Write-Output "Module manifest is valid"

      - name: Import Module
        shell: pwsh
        run: |
          Import-Module ./WinOptimizer.Core.psd1 -Force
          $commands = Get-Command -Module WinOptimizer.Core
          Write-Output "Exported functions: $($commands.Name -join ', ')"
          if ($commands.Count -lt 8) {
            Write-Error "Expected at least 8 exported functions, got $($commands.Count)"
            exit 1
          }
